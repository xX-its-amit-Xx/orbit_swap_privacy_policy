<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Swap — Closed Testing Signup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0a1a;
    --bg-card: rgba(255,255,255,0.04);
    --accent: #7df9ff;
    --accent-glow: rgba(125,249,255,0.25);
    --accent-hot: #ff6b6b;
    --text-primary: #e8eaf0;
    --text-secondary: #8a8fa8;
    --border: rgba(125,249,255,0.12);
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated background orbits */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(125,249,255,0.06);
    animation: orbit 25s linear infinite;
    pointer-events: none;
  }
  body::before {
    width: 600px; height: 600px;
    top: -100px; left: -150px;
    border-width: 1.5px;
    border-color: rgba(125,249,255,0.08);
  }
  body::after {
    width: 900px; height: 900px;
    bottom: -200px; right: -300px;
    animation-duration: 40s;
    animation-direction: reverse;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(80px);
    opacity: 0.35;
  }
  .orb-1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, var(--accent), transparent 70%);
    top: 10%; left: 5%;
    animation: float 12s ease-in-out infinite;
  }
  .orb-2 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, var(--accent-hot), transparent 70%);
    bottom: 15%; right: 8%;
    animation: float 15s ease-in-out infinite reverse;
  }
  .orb-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #a78bfa, transparent 70%);
    top: 50%; left: 60%;
    animation: float 18s ease-in-out infinite 3s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    margin: 2rem;
    animation: fadeUp 0.8s ease-out;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* Spinning planet icon */
  .planet-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .planet {
    width: 72px; height: 72px;
    position: relative;
  }
  .planet-body {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 50%;
    position: absolute;
    top: 12px; left: 12px;
    box-shadow: 0 0 30px var(--accent-glow), inset -6px -4px 12px rgba(0,0,0,0.3);
  }
  .planet-ring {
    width: 72px; height: 20px;
    border: 2px solid rgba(125,249,255,0.4);
    border-radius: 50%;
    position: absolute;
    top: 26px; left: 0;
    transform: rotateX(70deg);
    animation: ring-spin 6s linear infinite;
  }
  @keyframes ring-spin {
    from { transform: rotateX(70deg) rotateZ(0deg); }
    to { transform: rotateX(70deg) rotateZ(360deg); }
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(125,249,255,0.08);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.4em 1.2em;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
  }
  h1 span {
    background: linear-gradient(135deg, var(--accent), #a78bfa, var(--accent-hot));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .field {
    margin-bottom: 1.2rem;
  }
  .field:last-of-type {
    margin-bottom: 1.8rem;
  }

  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }
  label .required {
    color: var(--accent-hot);
  }

  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    color: var(--text-primary);
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
  }
  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.2);
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .platform-group {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .platform-option {
    position: relative;
  }
  .platform-option input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }
  .platform-option label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 0.5em 1em;
    cursor: pointer;
    transition: all 0.25s;
    user-select: none;
  }
  .platform-option input:checked + label {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(125,249,255,0.06);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .platform-option label:hover {
    border-color: rgba(125,249,255,0.3);
  }

  .btn-submit {
    width: 100%;
    padding: 1rem;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.02em;
    color: var(--bg-deep);
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }
  .btn-submit:active {
    transform: translateY(0);
  }
  .btn-submit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-submit:hover::after {
    transform: translateX(100%);
  }

  /* Success state */
  .success-state {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
  }
  .success-state.active {
    display: block;
    animation: fadeUp 0.5s ease-out;
  }
  .success-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
  }
  .success-state h2 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .success-state p {
    color: var(--text-secondary);
    font-weight: 300;
  }

  .form-state.hidden { display: none; }

  .footer-note {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .footer-note a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Dots grid background */
  .dots-bg {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(125,249,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="dots-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="planet-wrap">
    <div class="planet">
      <div class="planet-body"></div>
      <div class="planet-ring"></div>
    </div>
  </div>

  <div style="text-align:center; margin-bottom: 2.5rem;">
    <div class="badge">Closed Beta</div>
    <h1><span>Orbit Swap</span></h1>
    <p class="subtitle">Be among the first to play. Sign up for early access to our closed testing list and help shape the game.</p>
  </div>

  <div class="card">
    <div class="form-state" id="formState">
      <div class="field">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label>Name</label>
        <input type="text" id="name" placeholder="What should we call you?">
      </div>

      <div class="field">
        <label>Platform</label>
        <div class="platform-group">
          <div class="platform-option">
            <input type="checkbox" id="ios" value="iOS">
            <label for="ios">🍎 iOS</label>
          </div>
          <div class="platform-option">
            <input type="checkbox" id="android" value="Android">
            <label for="android">🤖 Android</label>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Anything else?</label>
        <textarea id="notes" placeholder="Favorite mobile games, what excites you about Orbit Swap, etc."></textarea>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
        Join the Testing List
      </button>
    </div>

    <div class="success-state" id="successState">
      <div class="success-icon">🪐</div>
      <h2>You're on the list!</h2>
      <p>We'll reach out when it's time to test. Keep an eye on your inbox.</p>
    </div>
  </div>

  <p class="footer-note">Your email is only used for Orbit Swap testing updates. No spam, ever.</p>
</div>

<script>
  /*
   * GOOGLE SHEETS SETUP — 3 steps:
   *
   * 1. Create a Google Sheet with these headers in row 1:
   *    Timestamp | Email | Name | Platform | Notes
   *
   * 2. Go to Extensions > Apps Script, delete the default code, and paste:
   *
   *    function doPost(e) {
   *      var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
   *      var data = JSON.parse(e.postData.contents);
   *      sheet.appendRow([
   *        data.timestamp,
   *        data.email,
   *        data.name,
   *        data.platform,
   *        data.notes
   *      ]);
   *      return ContentService
   *        .createTextOutput(JSON.stringify({ result: "success" }))
   *        .setMimeType(ContentService.MimeType.JSON);
   *    }
   *
   * 3. Click Deploy > New deployment > Web app
   *    - Execute as: Me
   *    - Who has access: Anyone
   *    - Copy the URL and paste it below:
   */

  const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtg1ZJqEyabstjjRIGpOMbtsm5VFulcOd1dkSX5d8EgZw68xOm48pE8AkrNwyLVVAf/exec';

  function handleSubmit() {
    const emailEl = document.getElementById('email');
    const email = emailEl.value.trim();

    if (!email || !email.includes('@') || !email.includes('.')) {
      emailEl.focus();
      emailEl.style.borderColor = 'var(--accent-hot)';
      setTimeout(() => { emailEl.style.borderColor = ''; }, 2000);
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    btn.style.opacity = '0.6';

    const data = {
      email: email,
      name: document.getElementById('name').value.trim(),
      platform: [
        document.getElementById('ios').checked ? 'iOS' : '',
        document.getElementById('android').checked ? 'Android' : ''
      ].filter(Boolean).join(', '),
      notes: document.getElementById('notes').value.trim(),
      timestamp: new Date().toISOString()
    };

    if (GOOGLE_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      console.warn('No Google Script URL set — showing success preview.');
      console.log('Signup data:', data);
      showSuccess();
      return;
    }

    fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',       /* Apps Script doesn't support CORS, but the data still goes through */
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(() => {
      showSuccess();
    })
    .catch((err) => {
      console.error('Submission error:', err);
      btn.disabled = false;
      btn.textContent = 'Join the Testing List';
      btn.style.opacity = '1';
      alert('Something went wrong — please try again.');
    });
  }

  function showSuccess() {
    document.getElementById('formState').classList.add('hidden');
    document.getElementById('successState').classList.add('active');
  }
</script>

</body>
</html>
